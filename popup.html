<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { height: 100%; margin: 0; background-color: #020617; color: #f8fafc; overflow: hidden; }
    .log-entry { margin-bottom: 4px; border-left: 2px solid #3b82f6; padding-left: 10px; font-size: 11px; font-family: 'Courier New', monospace; }
    .log-error { border-left-color: #ef4444; color: #f87171; }
    .log-success { border-left-color: #10b981; color: #34d399; }
    #log-container::-webkit-scrollbar { width: 4px; }
    #log-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    .responsive-card { width: 100%; height: 100%; max-width: 550px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
    @media (min-width: 640px) { .responsive-card { border-radius: 2.5rem; height: auto; } }
    .pulse { animation: pulse-animation 2s infinite; }
    @keyframes pulse-animation { 0% { box-shadow: 0 0 0 0px rgba(59, 130, 246, 0.5); } 100% { box-shadow: 0 0 0 12px rgba(59, 130, 246, 0); } }
    input:disabled, textarea:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body class="flex justify-center p-2 items-center sm:p-8">
  <div class="responsive-card flex flex-col p-8 relative overflow-hidden rounded-2xl">
    <header class="flex justify-between items-center mb-6">
      <div class="flex items-center gap-4">
        <div class="relative">
          <img src="https://image2url.com/r2/default/images/1774317141895-f7230ba7-c3db-4d19-a1a1-106596403da1.jpg" class="w-12 h-12 rounded-xl border-2 border-blue-500/30 object-cover shadow-lg">
          <div class="absolute -bottom-1 -right-1 w-3 h-3 bg-blue-500 rounded-full border-2 border-slate-900 pulse"></div>
        </div>
        <div>
          <h2 class="text-xl font-black tracking-tighter bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent uppercase">Ryuko Auto Share</h2>
          <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest">v1.0 Beta Test</p>
        </div>
      </div>
    </header>

    <div class="flex-1 space-y-4 overflow-y-auto">
      <div>
        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1 mb-2 flex justify-between">
          <span>Session Cookie</span>
          <span id="copyCookie" class="cursor-pointer text-blue-400 hover:underline">Copy</span>
        </label>
        <textarea id="cookieDisplay" readonly class="w-full h-40 p-3 rounded-xl bg-black/50 border border-slate-800 text-[10px] font-mono text-slate-400 outline-none resize-none" placeholder="Detecting session..."></textarea>
      </div>

      <div>
        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1 mb-2 block">Post URL</label>
        <input type="text" id="shareUrl" placeholder="https://facebook.com/..." class="w-full px-4 py-3 rounded-xl bg-black/50 border border-slate-800 focus:border-blue-500 outline-none text-sm">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-[10px] font-bold text-slate-500 uppercase ml-1 mb-2 block">Quantity</label>
          <input type="number" id="shareCount" value="10" class="w-full px-4 py-3 rounded-xl bg-black/50 border border-slate-800 focus:border-blue-500 outline-none text-sm">
        </div>
        <div>
          <label class="text-[10px] font-bold text-slate-500 uppercase ml-1 mb-2 block">Delay (ms)</label>
          <input type="number" id="interval" value="1500" class="w-full px-4 py-3 rounded-xl bg-black/50 border border-slate-800 focus:border-blue-500 outline-none text-sm">
        </div>
      </div>

      <button id="startBtn" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-black rounded-xl shadow-lg active:scale-[0.98] transition-all uppercase tracking-widest text-[11px]">
        Start Sharing
      </button>

      <div id="log-container-wrapper" class="relative bg-black/80 rounded-xl border border-white/5 overflow-hidden flex flex-col h-56">
        <div id="log-container" class="flex-1 p-4 overflow-y-auto text-slate-400 scroll-smooth">
          <div class="text-blue-500/50 text-[10px] mb-2">Terminal Ready.</div>
        </div>
        
        <div class="bg-slate-900/80 backdrop-blur-md border-t border-white/5 p-3 flex flex-col items-center gap-2">
          <p class="text-[8px] text-center font-bold text-slate-500 uppercase tracking-widest">this beta version may contain bugs, lags etc. if you encountered some of this please contact me. click any social media button bellow and don't forget to follow me!</p>
          <div class="flex gap-4">
            <a href="https://facebook.com/ryukodev" target="_blank" class="hover:scale-110 transition-transform text-blue-500">
              <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M9 8h-3v4h3v12h5v-12h3.642l.358-4h-4v-1.667c0-.955.192-1.333 1.115-1.333h2.885v-5h-3.808c-3.596 0-5.192 1.583-5.192 4.615v3.385z"/></svg>
            </a>
            <a href="https://github.com/ryukodeveloper" target="_blank" class="hover:scale-110 transition-transform text-white">
              <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            </a>
          </div>
        </div>
      </div>

      <button id="clearBtn" class="w-full py-2 bg-slate-800/30 hover:bg-slate-800/60 border border-white/5 text-slate-500 font-bold rounded-xl transition-all uppercase text-[8px] tracking-[0.3em]">Reset Data & Logs</button>
    </div>
    
    <footer class="mt-4 pt-3 border-t border-white/5 text-center">
      <p class="text-[9px] font-black text-slate-700 uppercase tracking-[0.4em]">CREATED BY RYUKO DEVELOPER</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
